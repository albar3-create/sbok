  <script>
    // جلب معلومات عامة من ipinfo وعرضها
    // ملاحظة: الاعتماد على خدمة خارجية قد يتأثر بالحدود/المفاتيح/CORS
    fetch("https://ipinfo.io/json")
      .then(function (response) { return response.json(); })
      .then(function (data) {
        try { delete data.readme; } catch (e) {}
        var infoDiv = document.getElementById("ip-info");
        infoDiv.textContent = JSON.stringify(data, null, 2);
      })
      .catch(function (err) {
        var infoDiv = document.getElementById("ip-info");
        infoDiv.textContent = "تعذّر جلب المعلومات: " + err;
      });
  </script>
